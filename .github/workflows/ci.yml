name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npx vitest run
      - name: Build
        run: npx next build

  bench:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: TTFB benchmark
        run: npx tsx benchmarks/ttft_benchmark.ts --runs 200 --reply 240

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t vercel-ai-chat-kit:ci .
